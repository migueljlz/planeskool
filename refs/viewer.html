<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;background:#333}canvas{display:block;width:100%;margin:0 0 8px}</style></head>
<body>
<div id="out"></div>
<script type="module">
import * as pdfjs from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs';
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
const doc = await pdfjs.getDocument('../uploads/Guia - IA Influencer Skool.pdf').promise;
window.__n = doc.numPages;
for(let i=1;i<=doc.numPages;i++){
  const page = await doc.getPage(i);
  const vp = page.getViewport({ scale: 1.0 });
  const c = document.createElement('canvas');
  c.width = vp.width; c.height = vp.height;
  document.getElementById('out').appendChild(c);
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  window.__done = i;
}
window.__alldone = true;
</script>
</body>
</html>
